    // ==========================================
    // Character Select View
    // ==========================================
    function CharacterSelectView({ roomData, roomId, user, db, appId }) {
      const myPlayerInfo = roomData.players.find(p => p.uid === user.uid) || roomData.spectators?.find(p => p.uid === user.uid) || { uid: user.uid, name: '관전자', team: 'spectator' };
      const myTeam = myPlayerInfo?.team;
      const isSpectator = myTeam === 'spectator';
      const isHost = roomData.hostId === user.uid;
      const ready = roomData.ready || { A: false, B: false };
      
      const selectChar = async (team, charName) => {
        if (myTeam !== team || isSpectator) return;
        if (ready[team]) return;
        const oppTeam = team === 'A' ? 'B' : 'A';
        if (roomData.characters[oppTeam] === charName) return;
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
          [`characters.${team}`]: charName
        });
      };

      const toggleReady = async (team) => {
        if (myTeam !== team || isSpectator) return;
        if (!roomData.characters[team]) return alert("말(캐릭터)을 먼저 선택해주세요.");
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
          [`ready.${team}`]: !ready[team]
        });
      };

      useEffect(() => {
        if (ready.A && ready.B && roomData.status === 'character_select' && isHost) {
          const winningIdx = Math.floor(Math.random() * 2);
          updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
            status: 'turn_select', 
            turnData: { winningIdx: winningIdx },
            logs: arrayUnion('양 팀 모두 준비 완료. 선후공 결정을 진행합니다.'),
            lastActionTime: Date.now() // 타임아웃 갱신
          });
        }
      }, [ready.A, ready.B, roomData.status, isHost, roomId, db, appId]);

      return (
        <div className="flex flex-col items-center justify-start sm:justify-center bg-[#f3f4f6] p-4 md:p-6 min-h-full pb-12 w-full">
          <div className="mt-8 sm:mt-0 text-center">
            <h1 className="text-3xl md:text-4xl font-black text-gray-800 mb-2">말(캐릭터) 선택</h1>
            <p className="text-gray-500 mb-6 md:mb-10 text-xs md:text-base px-4">
               {isSpectator ? '플레이어들이 말을 선택하고 있습니다. 잠시 기다려주세요.' : '자신의 팀 말을 선택하고 준비를 완료해주세요. 양 팀 모두 준비되면 시작됩니다.'}
            </p>
          </div>
          
          <div className="flex flex-col md:flex-row gap-6 lg:gap-16 mb-8 w-full max-w-4xl justify-center items-center md:items-start">
            <div className="flex flex-col items-center w-full md:w-auto bg-white md:bg-transparent p-4 md:p-0 rounded-2xl shadow-sm md:shadow-none border border-gray-200 md:border-none">
              <h2 className="text-lg md:text-xl font-bold text-blue-800 mb-4 md:mb-6 bg-blue-100 px-6 py-1.5 md:px-8 md:py-2 rounded-full border border-blue-200 shadow-sm flex items-center gap-2">
                팀 A {ready.A && <span className="text-[10px] md:text-xs bg-blue-500 text-white px-2 py-0.5 md:py-1 rounded-full">준비완료</span>}
              </h2>
              {/* flex-wrap 제거하고, 무조건 한 줄에 배치 (너비 조절) */}
              <div className="flex flex-row justify-center gap-2 md:gap-6 mb-4 md:mb-6 w-full">
                {Object.keys(CHARACTERS).map(charName => {
                  const char = CHARACTERS[charName];
                  const isSelectedByTeam = roomData.characters.A === charName;
                  const disabled = roomData.characters.B === charName || myTeam !== 'A' || ready.A || isSpectator;
                  return (
                    <div key={`A-${charName}`} onClick={() => !disabled && selectChar('A', charName)}
                      className={`relative w-20 h-28 sm:w-24 sm:h-32 md:w-32 md:h-40 rounded-xl md:rounded-2xl cursor-pointer transition-all duration-300 flex flex-col items-center justify-center border-2 bg-white flex-shrink-0
                        ${isSelectedByTeam ? `scale-105 md:scale-110 shadow-xl border-blue-400` : 'border-gray-200 hover:border-gray-400'}
                        ${disabled && !isSelectedByTeam ? 'opacity-40 grayscale cursor-not-allowed' : ''}
                      `}>
                      {isSelectedByTeam && <CheckCircle2 className="absolute top-1 right-1 md:top-2 md:right-2 text-blue-500 w-5 h-5 md:w-6 md:h-6"/>}
                      <ChessPiece3D character={char} count={1} size="large" />
                      <span className={`mt-3 md:mt-5 font-bold text-xs md:text-base ${isSelectedByTeam ? 'text-gray-800' : 'text-gray-500'}`}>{char.name}</span>
                    </div>
                  )
                })}
              </div>
              {myTeam === 'A' && (
                <button onClick={() => toggleReady('A')}
                  className={`w-full md:w-auto px-6 py-2.5 md:px-8 md:py-3 rounded-lg md:rounded-xl font-bold text-white shadow-md transition-all active:scale-95 text-sm md:text-base ${ready.A ? 'bg-gray-500 hover:bg-gray-600' : 'bg-blue-600 hover:bg-blue-700'}`}>
                  {ready.A ? '준비 취소' : '준비 완료'}
                </button>
              )}
            </div>
            
            <div className="flex flex-col items-center w-full md:w-auto bg-white md:bg-transparent p-4 md:p-0 rounded-2xl shadow-sm md:shadow-none border border-gray-200 md:border-none">
              <h2 className="text-lg md:text-xl font-bold text-red-800 mb-4 md:mb-6 bg-red-100 px-6 py-1.5 md:px-8 md:py-2 rounded-full border border-red-200 shadow-sm flex items-center gap-2">
                팀 B {ready.B && <span className="text-[10px] md:text-xs bg-red-500 text-white px-2 py-0.5 md:py-1 rounded-full">준비완료</span>}
              </h2>
              {/* flex-wrap 제거하고, 무조건 한 줄에 배치 (너비 조절) */}
              <div className="flex flex-row justify-center gap-2 md:gap-6 mb-4 md:mb-6 w-full">
                {Object.keys(CHARACTERS).map(charName => {
                  const char = CHARACTERS[charName];
                  const isSelectedByTeam = roomData.characters.B === charName;
                  const disabled = roomData.characters.A === charName || myTeam !== 'B' || ready.B || isSpectator;
                  return (
                    <div key={`B-${charName}`} onClick={() => !disabled && selectChar('B', charName)}
                      className={`relative w-20 h-28 sm:w-24 sm:h-32 md:w-32 md:h-40 rounded-xl md:rounded-2xl cursor-pointer transition-all duration-300 flex flex-col items-center justify-center border-2 bg-white flex-shrink-0
                        ${isSelectedByTeam ? `scale-105 md:scale-110 shadow-xl border-red-400` : 'border-gray-200 hover:border-gray-400'}
                        ${disabled && !isSelectedByTeam ? 'opacity-40 grayscale cursor-not-allowed' : ''}
                      `}>
                      {isSelectedByTeam && <CheckCircle2 className="absolute top-1 right-1 md:top-2 md:right-2 text-red-500 w-5 h-5 md:w-6 md:h-6"/>}
                      <ChessPiece3D character={char} count={1} size="large" />
                      <span className={`mt-3 md:mt-5 font-bold text-xs md:text-base ${isSelectedByTeam ? 'text-gray-800' : 'text-gray-500'}`}>{char.name}</span>
                    </div>
                  )
                })}
              </div>
              {myTeam === 'B' && (
                <button onClick={() => toggleReady('B')}
                  className={`w-full md:w-auto px-6 py-2.5 md:px-8 md:py-3 rounded-lg md:rounded-xl font-bold text-white shadow-md transition-all active:scale-95 text-sm md:text-base ${ready.B ? 'bg-gray-500 hover:bg-gray-600' : 'bg-red-600 hover:bg-red-700'}`}>
                  {ready.B ? '준비 취소' : '준비 완료'}
                </button>
              )}
            </div>
          </div>
        </div>
      )
    }

    // ==========================================
    // Turn Select View 
    // ==========================================
    function TurnSelectView({ roomData, roomId, user, db, appId }) {
      const isPlayer = roomData.players.some(p => p.uid === user.uid && !p.isBot);
      const turnData = roomData.turnData || {};

      const handlePick = async (idx) => {
        if (!isPlayer || turnData.selected !== undefined) return;
        const isWin = idx === turnData.winningIdx;
        
        const clickerTeam = roomData.players.find(p => p.uid === user.uid)?.team || 'A';
        const oppTeam = clickerTeam === 'A' ? 'B' : 'A';
        
        const firstTeam = isWin ? clickerTeam : oppTeam;

        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
          'turnData.selected': idx,
          'turnData.firstTeam': firstTeam,
          logs: arrayUnion(`카드가 선택되었습니다! ${firstTeam === 'A' ? '팀 A' : '팀 B'}가 선공을 잡았습니다!`),
          lastActionTime: Date.now() // 타임아웃 시작 시간 기록
        });

        setTimeout(async () => {
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
            status: 'playing',
            turn: firstTeam,
            throwChances: 1,
            lastActionTime: Date.now() // 턴 시작 시간 갱신
          });
        }, 3000);
      };

      return (
        <div className="flex-1 w-full h-full flex flex-col items-center justify-center bg-[#f3f4f6] p-4 md:p-6 relative overflow-hidden min-h-[100dvh]">
          <h1 className="text-4xl md:text-5xl font-black text-gray-800 mb-2 md:mb-4 tracking-tighter">선후공 결정</h1>
          <p className="text-gray-500 mb-8 md:mb-16 text-sm md:text-lg font-medium text-center">
            {isPlayer ? '카드를 하나 먼저 선택하여 운명을 시험하세요.' : '플레이어들이 선후공 카드를 고르고 있습니다...'}
          </p>
          <div className="flex flex-row gap-6 md:gap-12 perspective-[1000px] justify-center items-center w-full">
            {[0, 1].map(idx => {
              const isSelected = turnData.selected === idx;
              const isRevealed = turnData.selected !== undefined;
              const isWinCard = idx === turnData.winningIdx;
              
              return (
                <div key={idx} onClick={() => handlePick(idx)}
                     className={`relative w-36 h-48 md:w-48 md:h-64 cursor-pointer transition-all duration-700
                       ${!isRevealed && isPlayer ? 'hover:-translate-y-2 md:hover:-translate-y-4 hover:shadow-2xl' : ''}
                       ${isSelected ? 'scale-105 md:scale-110 z-10' : 'scale-100'}
                     `}
                     style={{ transformStyle: 'preserve-3d', WebkitTransformStyle: 'preserve-3d', transform: isRevealed ? 'rotateY(180deg)' : 'rotateY(0deg)' }}>
                  
                  {/* Card Back */}
                  <div className="absolute inset-0 bg-gradient-to-br from-slate-700 to-slate-900 rounded-2xl md:rounded-3xl border-2 md:border-4 border-slate-500 shadow-xl flex items-center justify-center"
                       style={{ backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', transform: 'rotateY(0deg)' }}>
                    <div className="text-5xl md:text-6xl opacity-40 font-black text-white">?</div>
                  </div>

                  {/* Card Front */}
                  <div className="absolute inset-0 rounded-2xl md:rounded-3xl border-2 md:border-4 flex flex-col items-center justify-center shadow-2xl p-2 text-center"
                       style={{ 
                         backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden', transform: 'rotateY(180deg)',
                         backgroundColor: isWinCard ? '#fef08a' : '#e5e7eb', borderColor: isWinCard ? '#ca8a04' : '#9ca3af'
                       }}>
                    <span className={`text-3xl md:text-5xl font-black ${isWinCard ? 'text-amber-600' : 'text-gray-500'}`}>
                      {isWinCard ? '선공' : '후공'}
                    </span>
                    <span className="text-xs md:text-sm font-bold mt-2 md:mt-4 opacity-50">
                      {isWinCard ? '먼저 시작합니다' : '나중에 시작합니다'}
                    </span>
                  </div>
                </div>
              )
            })}
          </div>
          {turnData.selected !== undefined && (
            <div className="absolute bottom-10 md:bottom-20 text-lg md:text-2xl font-black text-amber-600 animate-pulse bg-white px-6 py-2.5 md:px-8 md:py-3 rounded-full shadow-lg border-2 border-amber-200 text-center mx-4">
              {turnData.firstTeam === 'A' ? '팀 A' : '팀 B'} 선공! <br className="block sm:hidden"/>곧 시작됩니다...
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // Game View
    // ==========================================
    function GameView({ roomData, roomId, user, onLeave, db, appId }) {
      const [selectedPiece, setSelectedPiece] = useState(null);
      const [messages, setMessages] = useState([]);
      const [isRolling, setIsRolling] = useState(false);
      const [rollingResult, setRollingResult] = useState(null);
      const lastRollingEventId = useRef(null);
      // 타임아웃을 위한 현재 시간 상태
      const [now, setNow] = useState(Date.now());
      
      const [isMobileChatOpen, setIsMobileChatOpen] = useState(false);

      const myPlayerInfo = roomData.players.find(p => p.uid === user.uid) || roomData.spectators?.find(p => p.uid === user.uid) || { uid: user.uid, name: '관전자', team: 'spectator' };
      const isSpectator = myPlayerInfo.team === 'spectator';
      const myTeam = isSpectator ? 'A' : (myPlayerInfo.team || 'A'); 
      const oppTeam = myTeam === 'A' ? 'B' : 'A';
      const isHost = roomData.hostId === user.uid;

      const isBotTurn = roomData.players.filter(p => p.team === roomData.turn).every(p => p.isBot);
      const isMyTurn = !isSpectator && ((roomData.turn === myPlayerInfo.team) || (isHost && isBotTurn));
      const playingTeam = isMyTurn ? roomData.turn : myTeam;

      useEffect(() => {
        if (!db || !roomId) return;
        const chatRef = collection(db, 'artifacts', appId, 'public', 'data', `yut_rooms_${roomId}_chat`);
        const unsubscribe = onSnapshot(chatRef, (snapshot) => {
          const rawMsgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          rawMsgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)); // 오래된순 정렬로 변경
          setMessages(rawMsgs);
        });
        return () => unsubscribe();
      }, [db, roomId, appId]);

      useEffect(() => {
        if (roomData?.rollingEvent && roomData.rollingEvent.id !== lastRollingEventId.current) {
          lastRollingEventId.current = roomData.rollingEvent.id;
          const result = YUT_RESULTS[roomData.rollingEvent.resultKey];
          setIsRolling(true);
          setRollingResult({ key: roomData.rollingEvent.resultKey, ...result });
          setTimeout(() => {
            setIsRolling(false);
            setRollingResult(null);
          }, 1200);
        }
      }, [roomData?.rollingEvent]);

      // 타임아웃 카운터 1초마다 갱신
      useEffect(() => {
        if (roomData?.status !== 'playing') return;
        const interval = setInterval(() => setNow(Date.now()), 1000);
        return () => clearInterval(interval);
      }, [roomData?.status]);

      // 타임아웃 계산 (60초)
      const timeoutSecondsLeft = Math.max(0, 60 - Math.floor((now - (roomData?.lastActionTime || now)) / 1000));
      // 내 턴이 아니고, 관전자도 아니며, 시간이 60초 넘게 초과되었을 때 (버튼 활성화)
      const isOpponentTimeout = !isMyTurn && !isSpectator && roomData?.lastActionTime && (now - roomData.lastActionTime > 60000);

      const checkTurnEnd = async (currentChances, currentQueue) => {
        if (currentChances <= 0 && currentQueue.length === 0) {
          const nextTurn = roomData.turn === 'A' ? 'B' : 'A';
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
            turn: nextTurn, throwChances: 1, logs: arrayUnion(`[턴 종료] ${nextTurn === 'A' ? '팀 A' : '팀 B'}의 차례입니다.`),
            lastActionTime: Date.now() // 턴 종료 시 타임아웃 리셋
          });
          return true;
        }
        return false;
      };

      const throwYut = async () => {
        if (!isMyTurn || isRolling) return alert("당신의 차례가 아닙니다.");
        if (roomData.throwChances <= 0) return alert("더 이상 윷을 던질 수 없습니다. 말을 이동하세요.");
        
        const myPieces = roomData.pieces[playingTeam];
        const activePieces = myPieces.filter(p => p.pos !== 30);
        if (activePieces.length === 0) return alert("모든 말이 완주했습니다!");

        const rand = Math.floor(Math.random() * 16);
        let resultKey = '2';
        if (rand === 0) resultKey = '-1'; else if (rand <= 3) resultKey = '1'; else if (rand <= 9) resultKey = '2'; else if (rand <= 13) resultKey = '3'; else if (rand === 14) resultKey = '4'; else if (rand === 15) resultKey = '5';
        
        const eventId = Date.now();
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
          rollingEvent: { id: eventId, resultKey: resultKey },
          lastActionTime: Date.now() // 윷 던질 때 타임아웃 리셋
        });
        
        setTimeout(async () => {
          const result = YUT_RESULTS[resultKey];
          const onBoardPieces = activePieces.filter(p => p.pos > 0 && p.pos < 30);
          let newChances = roomData.throwChances - 1; 
          if (resultKey === '4' || resultKey === '5') newChances += 1;

          if (resultKey === '-1' && onBoardPieces.length === 0) {
            await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
              throwChances: newChances, logs: arrayUnion(`[${CHARACTERS[roomData.characters[playingTeam]].name}] 빽도! (판에 말이 없어 이동 불가)`),
              lastActionTime: Date.now()
            });
            await checkTurnEnd(newChances, roomData.yutQueue); 
            return;
          }

          const newQueue = [...roomData.yutQueue, resultKey];
          await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
            yutQueue: newQueue, throwChances: newChances, logs: arrayUnion(`[${CHARACTERS[roomData.characters[playingTeam]].name}] ${result.name}를 던졌습니다!`),
            lastActionTime: Date.now()
          });
          await checkTurnEnd(newChances, newQueue);
        }, 1200); 
      };

      const calculateDestination = (startPos, steps) => {
        if (steps === -1) {
          if (startPos === 0) return 0;
          if (startPos === 20) return 29;
          if (startPos === 15) return 25;
          return Math.max(0, startPos - 1);
        }
        let currentPos = startPos;
        if (currentPos === 0) { currentPos = 1; steps--; }
        for (let i = 0; i < steps; i++) {
          if (currentPos === 30) break;
          const node = BOARD_GRAPH[currentPos];
          if (!node) break;
          if (i === 0 && node.length > 1) currentPos = node[1]; else currentPos = node[0];
        }
        return currentPos;
      };

      const executeMove = async (pieceId, yutKey, queueIndex) => {
        const steps = YUT_RESULTS[yutKey].steps;
        const isBackDo = steps === -1;
        const myPieces = [...roomData.pieces[playingTeam]];
        const targetPiece = myPieces.find(p => p.id === pieceId);
        
        if (isBackDo && targetPiece.pos === 0) return alert("대기 중인 말은 빽도로 이동할 수 없습니다.");

        const startPos = targetPiece.pos;
        const groupedPiecesIds = startPos > 0 ? myPieces.filter(p => p.pos === startPos).map(p => p.id) : [pieceId];
        const destPos = calculateDestination(startPos, steps);

        const updatedMyPieces = myPieces.map(p => {
          if (groupedPiecesIds.includes(p.id)) return { ...p, pos: destPos };
          return p;
        });

        let extraTurnFromCatch = false;
        const oppPlayingTeam = playingTeam === 'A' ? 'B' : 'A';
        let updatedOppPieces = [...roomData.pieces[oppPlayingTeam]];

        if (destPos > 0 && destPos < 30) {
          const caughtPieces = updatedOppPieces.filter(p => p.pos === destPos);
          if (caughtPieces.length > 0) {
            updatedOppPieces = updatedOppPieces.map(p => {
              if (p.pos === destPos) return { ...p, pos: 0 };
              return p;
            });
            extraTurnFromCatch = true;
          }
        }

        const newQueue = [...roomData.yutQueue];
        newQueue.splice(queueIndex, 1);

        let newChances = roomData.throwChances;
        let turnMsg = "";
        
        if (extraTurnFromCatch) {
          newChances += 1; 
          turnMsg = `상대 말을 잡았습니다! 한 번 더 던지세요.`;
        }

        const piecesUpdate = { [playingTeam]: updatedMyPieces, [oppPlayingTeam]: updatedOppPieces };
        const isWin = updatedMyPieces.every(p => p.pos === 30);
        
        const updateData = {
          pieces: piecesUpdate, yutQueue: newQueue, throwChances: newChances,
          logs: arrayUnion(`[${CHARACTERS[roomData.characters[playingTeam]].name}] 말이 이동했습니다. ${turnMsg}`),
          lastActionTime: Date.now() // 말 이동 시 타임아웃 리셋
        };

        if (isWin) {
          updateData.status = 'finished';
          updateData.winnerTeam = playingTeam;
          updateData.logs = arrayUnion(`🎉 ${playingTeam === 'A' ? '팀 A' : '팀 B'}가 승리했습니다! 게임 종료.`);

          // 정상 승리 전적 업데이트 로직 
          const winners = roomData.players.filter(p => p.team === playingTeam && !p.isBot);
          const losers = roomData.players.filter(p => p.team !== playingTeam && p.team !== 'spectator' && !p.isBot);

          roomData.players.forEach(async (p) => {
             if (p.isBot || p.team === 'spectator') return;
             const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'yut_users', p.uid);
             const isWinner = p.team === playingTeam;
             const opps = isWinner ? losers : winners;
             
             try {
               const userSnap = await getDoc(userRef);
               let updates = {};
               if (isWinner) updates.wins = increment(1);
               else updates.losses = increment(1);
               
               opps.forEach(opp => {
                   if (isWinner) updates[`versus.${opp.uid}.wins`] = increment(1);
                   else updates[`versus.${opp.uid}.losses`] = increment(1);
                   updates[`versus.${opp.uid}.name`] = opp.name;
               });

               if (!userSnap.exists()) {
                  let initialData = { wins: isWinner ? 1 : 0, losses: !isWinner ? 1 : 0, versus: {} };
                  opps.forEach(opp => {
                      initialData.versus[opp.uid] = { wins: isWinner ? 1 : 0, losses: !isWinner ? 1 : 0, name: opp.name };
                  });
                  await setDoc(userRef, initialData);
               } else {
                  await updateDoc(userRef, updates);
               }
             } catch(err) {
               console.error("전적 업데이트 에러:", err);
             }
          });
        }

        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), updateData);
        setSelectedPiece(null);

        if (!isWin) await checkTurnEnd(newChances, newQueue); 
      };

      // 타임아웃 발생 시 승리 선언 기능
      const claimVictoryByTimeout = async () => {
        if (!confirm("상대방의 응답이 1분 이상 없습니다.\n부전승으로 게임을 끝내시겠습니까?")) return;
        
        const winners = roomData.players.filter(p => p.team === myTeam && !p.isBot);
        const losers = roomData.players.filter(p => p.team !== myTeam && p.team !== 'spectator' && !p.isBot);

        roomData.players.forEach(async (p) => {
           if (p.isBot || p.team === 'spectator') return;
           const userRef = doc(db, 'artifacts', appId, 'public', 'data', 'yut_users', p.uid);
           const isWinner = p.team === myTeam;
           const opps = isWinner ? losers : winners;
           
           try {
             const userSnap = await getDoc(userRef);
             let updates = {};
             if (isWinner) updates.wins = increment(1);
             else updates.losses = increment(1);
             
             opps.forEach(opp => {
                 if (isWinner) updates[`versus.${opp.uid}.wins`] = increment(1);
                 else updates[`versus.${opp.uid}.losses`] = increment(1);
                 updates[`versus.${opp.uid}.name`] = opp.name;
             });

             if (!userSnap.exists()) {
                let initialData = { wins: isWinner ? 1 : 0, losses: !isWinner ? 1 : 0, versus: {} };
                opps.forEach(opp => {
                    initialData.versus[opp.uid] = { wins: isWinner ? 1 : 0, losses: !isWinner ? 1 : 0, name: opp.name };
                });
                await setDoc(userRef, initialData);
             } else {
                await updateDoc(userRef, updates);
             }
           } catch(err) {
             console.error("전적 업데이트 에러:", err);
           }
        });

        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
          status: 'finished',
          winnerTeam: myTeam,
          logs: arrayUnion(`🚨 상대방의 접속 끊김/시간 초과로 ${myTeam}팀이 승리했습니다!`)
        });
      };

      const handlePieceClick = (team, id) => {
        if (!isMyTurn || isRolling || isSpectator) return;
        if (team !== playingTeam) return;
        if (roomData.yutQueue.length === 0) return alert("사용할 수 있는 이동 횟수가 없습니다. 윷을 던지세요.");
        setSelectedPiece(selectedPiece?.id === id ? null : { team, id });
      };

      const renderPiecesOnBoard = () => {
        const allPieces = [...roomData.pieces.A.map(p=>({...p, team:'A'})), ...roomData.pieces.B.map(p=>({...p, team:'B'}))];
        const elements = [];
        const posGroups = {};
        
        allPieces.forEach(p => {
          if (p.pos > 0 && p.pos < 30) {
            if (!posGroups[p.pos]) posGroups[p.pos] = [];
            posGroups[p.pos].push(p);
          }
        });

        Object.keys(posGroups).forEach(pos => {
          const posObj = BOARD_POSITIONS[pos];
          if (!posObj) return;
          const pieces = posGroups[pos];
          const isSelected = selectedPiece && pieces.some(p => p.id === selectedPiece.id && p.team === selectedPiece.team);
          const charConfig = CHARACTERS[roomData.characters[pieces[0].team]];

          elements.push(
            <div key={`pos-${pos}`} onClick={() => !isSpectator && isMyTurn && pieces[0].team === playingTeam && handlePieceClick(pieces[0].team, pieces[0].id)}
              className={`absolute flex items-center justify-center cursor-pointer transition-transform z-10 transform -translate-x-1/2 -translate-y-[70%]
                ${isSelected ? 'scale-110 md:scale-125 z-20' : 'hover:scale-110'}
              `}
              style={{ left: `${posObj.x}%`, top: `${posObj.y}%` }}
            >
              {isSelected && <div className="absolute -bottom-1 w-8 h-8 md:w-10 md:h-10 bg-amber-400/50 rounded-full animate-ping blur-sm"></div>}
              <ChessPiece3D character={charConfig} count={pieces.length} />
            </div>
          );
        });
        return elements;
      };

      const myChar = CHARACTERS[roomData.characters[playingTeam]];
      const oppChar = CHARACTERS[roomData.characters[oppTeam]];

      return (
        <div className="flex flex-col lg:flex-row h-full lg:h-[100dvh] w-full bg-[#f3f4f6] relative">
          
          {/* Victory/Defeat (Result) Overlay */}
          {roomData.status === 'finished' && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/60 backdrop-blur-sm">
              <div className="bg-white p-8 md:p-12 rounded-3xl shadow-2xl flex flex-col items-center text-center mx-4 max-w-sm w-full animate-[textPop_0.5s_ease-out]">
                {roomData.winnerTeam === myTeam && !isSpectator ? (
                  <>
                    <div className="text-6xl md:text-8xl mb-4">🏆</div>
                    <h2 className="text-4xl md:text-5xl font-black text-blue-600 mb-2">승리!</h2>
                    <p className="text-gray-500 font-bold mb-8">축하합니다. 게임에서 승리하셨습니다.</p>
                  </>
                ) : isSpectator ? (
                  <>
                    <div className="text-6xl md:text-8xl mb-4">🏁</div>
                    <h2 className="text-4xl md:text-5xl font-black text-purple-600 mb-2">게임 종료</h2>
                    <p className="text-gray-500 font-bold mb-8">{roomData.winnerTeam}팀이 승리했습니다.</p>
                  </>
                ) : (
                  <>
                    <div className="text-6xl md:text-8xl mb-4">💀</div>
                    <h2 className="text-4xl md:text-5xl font-black text-red-600 mb-2">패배...</h2>
                    <p className="text-gray-500 font-bold mb-8">아쉽지만 다음 기회를 노려보세요.</p>
                  </>
                )}
                <button onClick={onLeave} className="w-full bg-gray-800 hover:bg-black text-white font-bold py-3 md:py-4 rounded-xl transition-all active:scale-95 text-base md:text-lg">
                  대기실로 돌아가기
                </button>
              </div>
            </div>
          )}

          {/* --- 완벽한 3D 반원통 윷가락 렌더링 --- */}
          {isRolling && (
            <div className="fixed inset-0 z-50 pointer-events-none flex items-center justify-center">
              <div className="absolute inset-0 bg-black/30"></div>
              <div className="relative w-full h-full flex items-center justify-center" style={{ perspective: '1500px' }}>
                {[0, 1, 2, 3].map((i) => {
                  const state = rollingResult?.states[i] || 0;
                  const isMarked = (rollingResult?.key === '-1' && i === 0);
                  const startX = (i - 1.5) * 60; 
                  const destX = (i - 1.5) * 85 + (Math.random() * 40 - 20);
                  const destY = Math.random() * 60 - 30;
                  const destRotZ = Math.random() * 120 - 60;
                  const delay = i * 0.05;

                  return (
                    <YutStick3D key={i} state={state} isMarked={isMarked} startX={startX} destX={destX} destY={destY} destRotZ={destRotZ} delay={delay} />
                  );
                })}
                <h2 className="absolute text-6xl md:text-8xl font-black text-white drop-shadow-[0_4px_30px_rgba(255,215,0,0.9)] z-10"
                    style={{ opacity: 0, animation: 'textPop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) 0.8s forwards' }}>
                  {rollingResult?.name}!!
                </h2>
              </div>
            </div>
          )}

          {/* Left Area: Game Board & Controls (모바일에서는 무조건 100dvh 핏) */}
          <div className="w-full lg:flex-1 h-[100dvh] lg:h-full flex flex-col p-2 sm:p-4 md:p-6 relative flex-shrink-0">
            
            {/* Header */}
            <div className="flex justify-between items-center mb-2 md:mb-4 bg-white p-3 md:p-4 rounded-xl shadow-sm border border-gray-200 flex-shrink-0">
              <div>
                <h2 className="text-sm md:text-xl font-black text-gray-800 truncate max-w-[150px] sm:max-w-[300px]">{roomData.name}</h2>
                <div className="text-[10px] md:text-sm font-bold flex items-center gap-1.5 md:gap-3 mt-1">
                  <span className="text-gray-500 hidden sm:inline">상태:</span>
                  {roomData.status === 'finished' ? (
                    <span className="text-purple-600 bg-purple-100 px-2 py-0.5 md:px-3 md:py-1 rounded">게임 종료</span>
                  ) : (
                    <div className="flex items-center gap-1 md:gap-2">
                       <span className={`px-1.5 py-0.5 md:px-3 md:py-1 rounded text-white ${roomData.turn === 'A' ? 'bg-blue-600 shadow-sm' : 'bg-gray-400'}`}>팀 A</span>
                       <span className="text-gray-400 font-black text-[10px] md:text-sm">VS</span>
                       <span className={`px-1.5 py-0.5 md:px-3 md:py-1 rounded text-white ${roomData.turn === 'B' ? 'bg-red-600 shadow-sm' : 'bg-gray-400'}`}>팀 B</span>
                       {isMyTurn && <span className="ml-1 md:ml-2 animate-pulse text-amber-600 text-[9px] md:text-xs font-black border border-amber-400 px-1.5 md:px-2 py-0.5 rounded-full whitespace-nowrap">내 차례!</span>}
                       {isSpectator && <span className="ml-1 md:ml-2 text-purple-600 text-[9px] md:text-xs font-black border border-purple-400 px-1.5 md:px-2 py-0.5 rounded-full whitespace-nowrap">관전 모드</span>}
                    </div>
                  )}
                </div>
              </div>
              <button onClick={onLeave} className="flex items-center gap-1 md:gap-2 text-gray-500 hover:text-gray-800 font-bold px-2 py-1.5 md:px-4 md:py-2 rounded-lg bg-gray-100 hover:bg-gray-200 transition-colors text-xs md:text-sm whitespace-nowrap">
                <LogOut size={14} className="md:w-4 md:h-4"/> <span className="hidden sm:inline">방 나가기</span><span className="sm:hidden">나가기</span>
              </button>
            </div>

            {/* Board Container */}
            <div className="flex-1 flex flex-col min-h-0 w-full bg-white rounded-2xl shadow-sm border border-gray-200 p-2 md:p-6 items-center justify-center relative">
               
               {/* 상대편 대기 말 영역 */}
               <div className="w-full max-w-[340px] sm:max-w-[450px] flex justify-between items-end mb-2 md:mb-4 px-2 flex-shrink-0">
                  <div className="flex items-center gap-1.5">
                     <div className={`w-2 h-2 rounded-full ${oppTeam === 'A' ? 'bg-blue-500' : 'bg-red-500'}`}></div>
                     <span className="text-[10px] md:text-xs font-bold text-gray-500">상대 대기 말 ({oppTeam}팀)</span>
                  </div>
                  <div className="flex gap-1 md:gap-3">
                     {roomData.pieces[oppTeam].map(p => (
                        <div key={p.id} className={`w-5 h-8 md:w-8 md:h-12 flex items-end justify-center ${p.pos > 0 ? 'opacity-30 grayscale' : ''}`}>
                           <ChessPiece3D character={oppChar} count={1} size="small" />
                        </div>
                     ))}
                  </div>
               </div>

               {/* 실제 윷판 영역 */}
               <div className="flex-1 w-full flex items-center justify-center min-h-0 relative mt-4 md:mt-0">
                 <div className="relative w-full aspect-square max-w-[300px] sm:max-w-[400px] md:max-w-[450px] max-h-[300px] sm:max-h-[400px] md:max-h-[450px] mx-auto flex-shrink-0">
                    <svg className="absolute inset-0 w-full h-full pointer-events-none" viewBox="0 0 100 100" preserveAspectRatio="none">
                       <rect x="0" y="0" width="100" height="100" fill="none" stroke="#9ca3af" strokeWidth="0.5" />
                       <line x1="0" y1="0" x2="100" y2="100" stroke="#9ca3af" strokeWidth="0.5" />
                       <line x1="100" y1="0" x2="0" y2="100" stroke="#9ca3af" strokeWidth="0.5" />
                    </svg>
                    {Object.keys(BOARD_POSITIONS).map(pos => {
                      const { x, y } = BOARD_POSITIONS[pos];
                      const isCorner = ['5', '10', '15', '20'].includes(pos);
                      const isCenter = pos === '23';
                      let isDestination = false;
                      if (selectedPiece && roomData.yutQueue.length > 0) {
                         const targetPiece = roomData.pieces[playingTeam].find(p => p.id === selectedPiece.id);
                         if (targetPiece) {
                            const predictedPos = calculateDestination(targetPiece.pos, YUT_RESULTS[roomData.yutQueue[0]].steps);
                            if (predictedPos.toString() === pos) isDestination = true;
                         }
                      }
                      return (
                        <div key={`bg-${pos}`} 
                          className={`absolute rounded-full bg-white border border-gray-400 flex items-center justify-center transition-all shadow-sm transform -translate-x-1/2 -translate-y-1/2
                            ${isCorner || isCenter ? 'w-6 h-6 md:w-8 md:h-8 border-[2px]' : 'w-3 h-3 md:w-4 md:h-4'}
                            ${isDestination ? 'ring-2 md:ring-4 ring-amber-400 bg-amber-100 scale-125 md:scale-150 z-0 border-amber-500' : ''}
                          `}
                          style={{ left: `${x}%`, top: `${y}%` }}
                        >
                          {isCenter && <div className="w-2 h-2 md:w-3 md:h-3 bg-gray-400 rounded-full"></div>}
                        </div>
                      )
                    })}
                    {renderPiecesOnBoard()}
                    <div className="absolute -bottom-6 -right-6 md:-bottom-10 md:-right-10 text-gray-500 font-bold bg-white px-2 py-1 md:px-4 md:py-1.5 rounded-full shadow-sm border border-gray-200 text-[8px] md:text-xs">출발/도착</div>
                 </div>
               </div>
            </div>

            {/* Bottom Controls */}
            <div className="bg-white mt-2 md:mt-4 rounded-xl md:rounded-3xl shadow-sm border border-gray-200 p-2 sm:p-4 md:p-6 flex flex-row gap-2 md:gap-8 flex-shrink-0">
              {/* 내 대기 말 영역 */}
              <div className="flex flex-col justify-center border-r border-gray-200 pr-2 md:pr-8 w-1/3 sm:w-auto">
                <h3 className="font-bold text-gray-700 mb-1 md:mb-2 flex items-center gap-1 md:gap-2 text-[10px] md:text-sm">
                  {isSpectator ? `[${myTeam}팀] 대기 말` : '내 대기 말'}
                  {isBotTurn && isMyTurn && <span className="text-purple-600 text-[8px] md:text-xs font-bold bg-purple-100 px-1 md:px-2 py-0.5 rounded">조작중</span>}
                </h3>
                <div className="flex flex-wrap gap-1 md:gap-4 justify-start">
                  {roomData.pieces[playingTeam].map(p => (
                    <div key={p.id} onClick={() => !isSpectator && p.pos === 0 && handlePieceClick(playingTeam, p.id)}
                      className={`relative ${!isSpectator ? 'cursor-pointer' : ''} transition-transform w-6 h-10 sm:w-8 sm:h-12 md:w-12 md:h-16 flex items-end justify-center
                        ${p.pos > 0 ? 'opacity-30 grayscale cursor-not-allowed' : (!isSpectator ? 'hover:-translate-y-1 md:hover:-translate-y-2' : '')}
                        ${selectedPiece?.id === p.id ? 'scale-110 drop-shadow-xl' : ''}
                      `}
                    >
                      {selectedPiece?.id === p.id && p.pos === 0 && <div className="absolute bottom-0 w-6 h-6 md:w-12 md:h-12 bg-yellow-400/50 rounded-full animate-ping blur-sm z-0"></div>}
                      <ChessPiece3D character={myChar} count={1} size="small" />
                      {p.pos === 30 && <div className="absolute inset-0 flex items-center justify-center text-green-500 font-black text-[10px] md:text-xl z-20 bg-white/80 rounded shadow-inner border border-green-200">완</div>}
                    </div>
                  ))}
                </div>
              </div>

              {/* 액션 컨트롤 영역 */}
              <div className="flex-1 flex flex-col justify-center min-w-0">
                {isOpponentTimeout ? (
                  <button onClick={claimVictoryByTimeout} 
                    className="w-full bg-red-600 hover:bg-red-700 text-white font-black text-sm sm:text-lg md:text-2xl py-3 sm:py-4 md:py-5 rounded-lg md:rounded-2xl shadow-sm md:shadow-lg active:translate-y-1 transition-all relative overflow-hidden animate-pulse">
                    상대방 응답 없음 (승리 처리)
                  </button>
                ) : (
                  <button onClick={throwYut} disabled={!isMyTurn || roomData.throwChances <= 0 || isRolling || isSpectator} 
                    className={`w-full bg-gray-800 hover:bg-black disabled:bg-gray-300 disabled:text-gray-500 text-white font-black text-sm sm:text-lg md:text-2xl py-3 sm:py-4 md:py-5 rounded-lg md:rounded-2xl shadow-sm md:shadow-lg active:translate-y-1 transition-all relative overflow-hidden
                      ${isSpectator ? 'opacity-70 cursor-not-allowed' : ''}`}>
                    {isSpectator ? '관전 중입니다' : (isMyTurn ? (roomData.throwChances > 0 ? `윷 던지기 (${roomData.throwChances}회)` : '말 이동하기') : (timeoutSecondsLeft > 0 ? `상대 턴 대기 (${timeoutSecondsLeft}초)` : '상대방 응답 없음'))}
                  </button>
                )}
                
                <div className="w-full bg-gray-50 p-1.5 md:p-3 mt-1.5 md:mt-4 rounded-lg md:rounded-xl border border-gray-200 flex gap-1.5 md:gap-3 items-center overflow-x-auto custom-scrollbar min-h-[44px] sm:min-h-[50px] md:min-h-[60px]">
                  {roomData.yutQueue.length === 0 && <span className="text-gray-400 text-[10px] md:text-sm font-bold w-full text-center py-1">적립된 이동 횟수가 없습니다</span>}
                  {roomData.yutQueue.map((yutKey, idx) => {
                    const res = YUT_RESULTS[yutKey];
                    return (
                      <button key={idx} onClick={() => !isSpectator && selectedPiece && executeMove(selectedPiece.id, yutKey, idx)} disabled={!selectedPiece || isSpectator}
                        className={`flex flex-col items-center justify-center min-w-[40px] h-9 sm:min-w-[50px] sm:h-10 md:min-w-[70px] md:h-14 rounded md:rounded-lg font-black shadow-sm transition-all border-b-2 md:border-b-4 flex-shrink-0 
                          ${selectedPiece && !isSpectator
                          ? 'bg-blue-500 hover:bg-blue-400 text-white border-blue-700 active:border-b-0 active:translate-y-1 cursor-pointer animate-pulse' 
                          : 'bg-gray-200 text-gray-500 border-gray-300'}
                        `}
                      >
                        <span className="text-[11px] sm:text-sm md:text-lg leading-none">{res.name}</span>
                        <span className="text-[8px] md:text-[10px] mt-0.5 md:mt-1">{res.steps > 0 ? `+${res.steps}` : `${res.steps}`}</span>
                      </button>
                    )
                  })}
                </div>
              </div>
            </div>
          </div>

          {/* Mobile Overlay Background */}
          {isMobileChatOpen && <div className="fixed inset-0 bg-black/60 z-[70] lg:hidden backdrop-blur-sm" onClick={() => setIsMobileChatOpen(false)}></div>}

          {/* Right Area: Chat & Logs (Mobile Slide-up / Desktop Fixed) */}
          <div className={`fixed bottom-0 left-0 right-0 z-[80] h-[85dvh] bg-white rounded-t-3xl lg:rounded-none lg:static lg:h-full lg:w-80 lg:border-l border-gray-200 flex flex-col shadow-2xl lg:shadow-sm transform transition-transform duration-300 ${isMobileChatOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'}`}>
            <div className="flex justify-between items-center p-4 border-b border-gray-200 lg:hidden bg-gray-50 rounded-t-3xl flex-shrink-0">
               <span className="font-black text-gray-800 text-lg">채팅 및 기록</span>
               <button onClick={() => setIsMobileChatOpen(false)} className="text-gray-500 hover:text-red-500 font-bold px-4 py-1.5 bg-white border border-gray-300 rounded-lg text-sm shadow-sm">닫기 ✕</button>
            </div>
            
            <div className="flex-1 lg:h-1/3 min-h-0 lg:min-h-[200px] border-b border-gray-200 flex flex-col bg-gray-50 flex-shrink-0">
              <div className="p-3 md:p-4 font-bold text-gray-700 border-b border-gray-200 text-sm flex items-center gap-2 flex-shrink-0">방 기록</div>
              <div className="flex-1 min-h-0 overflow-y-auto p-3 md:p-4 space-y-2 md:space-y-3 flex flex-col-reverse custom-scrollbar">
                {[...roomData.logs].reverse().map((log, idx) => (
                  <div key={idx} className="text-xs md:text-sm text-gray-600 bg-white p-2 md:p-3 rounded-lg shadow-sm border border-gray-100 font-medium leading-relaxed">
                    {log}
                  </div>
                ))}
              </div>
            </div>
            <ChatBox db={db} appId={appId} roomId={roomId} myPlayerInfo={myPlayerInfo} messages={messages} characters={roomData.characters} isMobileChatOpen={isMobileChatOpen} />
          </div>

          <button onClick={() => setIsMobileChatOpen(true)} className="lg:hidden fixed bottom-6 right-6 z-[60] bg-amber-600 text-white w-14 h-14 rounded-full shadow-2xl flex items-center justify-center active:scale-95 transition-transform">
            <MessageSquare size={28} />
          </button>
        </div>
      );
    }

    // ==========================================
    // Chat Sub-component
    // ==========================================
    function ChatBox({ db, appId, roomId, myPlayerInfo, messages, characters, isMobileChatOpen }) {
      const [input, setInput] = useState('');
      const [chatMode, setChatMode] = useState('all');
      const chatContainerRef = useRef(null);
      const isSpectator = myPlayerInfo.team === 'spectator';

      // 강제 스크롤 대신 컨테이너 내부의 scrollTop을 조작하여 화면 밀림 완벽 차단
      useEffect(() => {
        if (chatContainerRef.current) {
          chatContainerRef.current.scrollTop = chatContainerRef.current.scrollHeight;
        }
      }, [messages, chatMode, isMobileChatOpen]);

      const sendChat = async (e) => {
        e.preventDefault();
        if (!input.trim() || !db) return;
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `yut_rooms_${roomId}_chat`), {
          text: input, uid: myPlayerInfo.uid, name: myPlayerInfo.name, team: myPlayerInfo.team, mode: chatMode, timestamp: Date.now()
        });
        setInput('');
      };

      // 이모티콘(매크로) 즉시 전송 함수
      const sendEmoticon = async (text) => {
        if (!db) return;
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', `yut_rooms_${roomId}_chat`), {
          text: text, uid: myPlayerInfo.uid, name: myPlayerInfo.name, team: myPlayerInfo.team, mode: chatMode, timestamp: Date.now()
        });
        // 팝업 애니메이션을 위해 roomData의 emoticonEvent 필드 업데이트
        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'yut_rooms', roomId), {
          emoticonEvent: { id: Date.now(), text: text, sender: myPlayerInfo.name }
        });
      };

      const EMOTICONS = [
        "👋 안녕하세요!",
        "🙏 잘 부탁드립니다",
        "😎 아이고 쉽다~",
        "💃 얼쑤~!",
        "🔥 나이스!",
        "😭 아차차...",
        "😡 부들부들..."
      ];

      const visibleMessages = messages.filter(m => m.mode === 'all' || m.team === myPlayerInfo.team);

      return (
        <div className="flex-1 min-h-0 flex flex-col bg-white">
          <div className="p-2 md:p-3 border-b border-gray-200 flex justify-between items-center flex-shrink-0">
            <span className="font-bold text-gray-700 text-sm flex items-center gap-2"><MessageSquare size={16}/> 채팅</span>
            <div className="flex bg-gray-100 p-1 rounded-lg">
              <button onClick={() => setChatMode('all')} className={`text-[10px] md:text-xs px-3 py-1.5 rounded-md font-bold transition-colors ${chatMode === 'all' ? 'bg-white shadow-sm text-gray-800' : 'text-gray-500'}`}>전체</button>
              {!isSpectator && (
                <button onClick={() => setChatMode('team')} className={`text-[10px] md:text-xs px-3 py-1.5 rounded-md font-bold transition-colors ${chatMode === 'team' ? 'bg-blue-100 text-blue-700' : 'text-gray-500'}`}>팀 채팅</button>
              )}
            </div>
          </div>
          
          <div ref={chatContainerRef} className="flex-1 min-h-0 overflow-y-auto p-3 md:p-4 space-y-3 md:space-y-4 custom-scrollbar">
            {visibleMessages.map(m => {
              const isMe = m.uid === myPlayerInfo.uid;
              const isTeamChat = m.mode === 'team';
              const charName = characters?.[m.team] ? CHARACTERS[characters[m.team]].name : (m.team === 'spectator' ? '관전' : m.team);
              return (
                <div key={m.id} className={`flex flex-col ${isMe ? 'items-end' : 'items-start'}`}>
                  <span className="text-[10px] font-bold text-gray-400 mb-1 px-1">{m.name} [{charName}] {isTeamChat ? '(팀 전용)' : ''}</span>
                  <div className={`px-4 py-2 rounded-xl max-w-[90%] md:max-w-[85%] text-xs md:text-sm shadow-sm ${
                    isTeamChat ? 'bg-blue-600 text-white rounded-tr-sm' : (isMe ? 'bg-gray-800 text-white rounded-tr-sm' : 'bg-gray-100 text-gray-800 rounded-tl-sm')
                  }`}>{m.text}</div>
                </div>
              );
            })}
          </div>

          {/* 빠른 이모티콘(매크로) 영역 추가 */}
          <div className="flex gap-2 overflow-x-auto custom-scrollbar p-2 bg-gray-50 border-t border-gray-200 flex-shrink-0">
            {EMOTICONS.map((emo, idx) => (
              <button key={idx} onClick={() => sendEmoticon(emo)}
                className="whitespace-nowrap px-3 py-1.5 bg-white border border-gray-300 rounded-full text-[10px] md:text-xs font-bold text-gray-600 hover:bg-amber-50 hover:text-amber-600 hover:border-amber-300 transition-colors shadow-sm active:scale-95"
              >
                {emo}
              </button>
            ))}
          </div>

          <form onSubmit={sendChat} className="p-3 md:p-4 border-t border-gray-200 bg-gray-50 flex-shrink-0">
            <input type="text" value={input} onChange={(e) => setInput(e.target.value)} placeholder={chatMode === 'all' ? "메시지..." : "팀원 메시지..."}
              className="w-full px-4 py-3 bg-white border border-gray-300 rounded-xl focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 text-xs md:text-sm text-gray-800 transition-all shadow-sm" />
          </form>
        </div>
      );
    }

    // --- React 렌더링 ---
    const root = createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
