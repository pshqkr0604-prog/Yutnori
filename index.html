  <!-- Tailwind CSS 로드 -->
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- Babel (JSX 문법 변환기) 로드 -->

  <style>
    /* 스크롤바 디자인 */
    .custom-scrollbar::-webkit-scrollbar { width: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    
    /* 3D 렌더링 필수 속성 (평면화 방지) */
    .transform-style-3d { 
      transform-style: preserve-3d !important; 
      -webkit-transform-style: preserve-3d !important;
      backface-visibility: visible !important;
    }
    
    .backface-hidden {
      backface-visibility: hidden !important;
      -webkit-backface-visibility: hidden !important;
    }
    
    /* 3D 윷 던지기 공중 물리 애니메이션 */
    @keyframes yutToss {
      0% { transform: translate3d(var(--sx), 100vh, -200px) rotateX(0deg) rotateZ(0deg) scale(0.5); }
      30% { transform: translate3d(calc(var(--sx) + (var(--dx)*0.5)), -15vh, 400px) rotateX(1080deg) rotateZ(calc(var(--rz) * 2)) scale(1.4); } 
      60% { transform: translate3d(var(--dx), var(--dy), 0) rotateX(calc(1800deg + var(--frx))) rotateZ(var(--rz)) scale(1); } 
      80% { transform: translate3d(calc(var(--dx) + 10px), calc(var(--dy) - 20px), 0) rotateX(calc(1800deg + var(--frx))) rotateZ(calc(var(--rz) + 5deg)) scale(1); } 
      100% { transform: translate3d(calc(var(--dx) + 15px), var(--dy), 0) rotateX(calc(1800deg + var(--frx))) rotateZ(calc(var(--rz) + 10deg)) scale(1); } 
    }
    @keyframes textPop {
      0% { opacity: 0; transform: scale(0.5) translateY(20px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }
  </style>
</head>

    // ==========================================

    // --- Yut Board Logic ---
    const BOARD_GRAPH = {

    // ==========================================
    // Auth View (로그인 / 회원가입)
    // ==========================================
    function AuthView({ auth, setAuthError }) {
      const [isLogin, setIsLogin] = useState(true);
      const [id, setId] = useState('');
      const [password, setPassword] = useState('');
      const [loading, setLoading] = useState(false);

      const handleSubmit = async (e) => {
        e.preventDefault();
        if (!id || !password) return alert("아이디와 비밀번호를 모두 입력해주세요.");
        if (password.length < 6) return alert("비밀번호는 6자리 이상이어야 합니다.");
        
        setLoading(true);
        const email = `${id}@yutnori.game`; // 아이디를 이메일 형식으로 변환하여 사용
        
        try {
          if (isLogin) {
            await signInWithEmailAndPassword(auth, email, password);
          } else {
            await createUserWithEmailAndPassword(auth, email, password);
            alert("회원가입이 완료되었습니다. 자동으로 로그인됩니다.");
          }
        } catch (error) {
          console.error(error);
          if (error.code === 'auth/invalid-credential' || error.code === 'auth/user-not-found' || error.code === 'auth/wrong-password') {
             alert("아이디 또는 비밀번호가 일치하지 않습니다.");
          } else if (error.code === 'auth/email-already-in-use') {
             alert("이미 사용중인 아이디입니다.");
          } else {
             setAuthError(error.message);
          }
        } finally {
          setLoading(false);
        }
      };

      return (
        <div className="h-full w-full flex items-center justify-center bg-[#f3f4f6] p-4 md:p-6 overflow-y-auto">
          <div className="bg-white p-6 md:p-8 rounded-2xl shadow-xl max-w-md w-full border border-gray-200 m-auto">
            <h1 className="text-3xl md:text-4xl font-black text-gray-800 mb-2 text-center tracking-tighter drop-shadow-sm">실시간 윷놀이</h1>
            <p className="text-gray-500 text-sm md:text-base text-center mb-6 md:mb-8 font-medium">아이디와 비밀번호로 접속하세요</p>
            <form onSubmit={handleSubmit} className="space-y-4">
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">아이디</label>
                <input type="text" value={id} onChange={(e) => setId(e.target.value.replace(/[^a-zA-Z0-9]/g, ''))} maxLength={20}
                  className="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all text-sm md:text-base" placeholder="영문/숫자 아이디 입력" />
              </div>
              <div>
                <label className="block text-sm font-bold text-gray-700 mb-1">비밀번호</label>
                <input type="password" value={password} onChange={(e) => setPassword(e.target.value)}
                  className="w-full px-4 py-3 bg-gray-50 border border-gray-300 rounded-xl focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all text-sm md:text-base" placeholder="비밀번호 (6자리 이상)" />
              </div>
              <button type="submit" disabled={loading}
                className="w-full bg-amber-600 hover:bg-amber-700 text-white font-black text-base md:text-lg py-3 md:py-4 rounded-xl shadow-md transition-all active:scale-95 disabled:opacity-50 mt-4">
                {loading ? "처리중..." : (isLogin ? "로그인" : "회원가입")}
              </button>
            </form>
            <div className="mt-6 text-center">
              <button onClick={() => setIsLogin(!isLogin)} className="text-gray-500 font-bold hover:text-amber-600 transition-colors text-xs md:text-sm underline underline-offset-4">
                {isLogin ? "아이디가 없으신가요? 회원가입하기" : "이미 계정이 있으신가요? 로그인하기"}
              </button>
            </div>
          </div>
        </div>
      );
    }

    function ChessPiece3D({ character, count, size = "normal" }) {
      if (!character) return null;
      let scaleClass = 'scale-90 md:scale-100 origin-bottom';
      if (size === 'large') scaleClass = 'scale-110 md:scale-[1.8] origin-bottom';
      if (size === 'small') scaleClass = 'scale-50 md:scale-75 origin-bottom';

      return (
        <div className={`relative flex flex-col items-center justify-end w-10 h-16 pointer-events-none filter drop-shadow-[0_5px_5px_rgba(0,0,0,0.4)] transform ${scaleClass}`}>
          <div className="relative z-20 flex flex-col items-center mb-[-4px]">
            <div className="w-6 h-3 rounded-t-md border border-black/40 shadow-inner" style={{ background: character.bgLight }}></div>
            <div className="w-5 h-5 bg-[#fcd34d] rounded-full border border-[#b45309] flex items-center justify-center z-10 shadow-sm">
              <div className="flex gap-1 mt-1">
                <div className="w-1 h-1 bg-black rounded-full"></div>
                <div className="w-1 h-1 bg-black rounded-full"></div>
              </div>
            </div>
          </div>
          <div className="relative z-10 w-8 h-8 rounded-t-xl border-x border-t border-black/40 shadow-inner flex flex-col items-center justify-end pb-1"
               style={{ background: `linear-gradient(to bottom, ${character.bgLight}, ${character.bgDark})` }}>
            <span className="text-[9px] font-black text-white/90 drop-shadow-md">{character.hanja}</span>
          </div>
          <div className="relative z-0 flex flex-col items-center w-full">
            <div className="w-9 h-2.5 rounded-[50%] bg-[#475569] border border-[#1e293b] -mb-1 shadow-inner"></div>
            <div className="w-11 h-3.5 rounded-[50%] bg-[#1e293b] border-2 border-black shadow-[0_3px_5px_rgba(0,0,0,0.6)]"></div>
          </div>
          {count > 1 && (
            <div className="absolute -bottom-1 -right-3 z-30 bg-gradient-to-br from-yellow-300 to-yellow-600 text-yellow-950 font-black text-[10px] w-5 h-5 rounded-full flex items-center justify-center border-2 border-white shadow-[0_2px_4px_rgba(0,0,0,0.5)]">
              x{count}
            </div>
          )}
        </div>
      );
    }

    function YutStick3D({ state, isMarked, startX, destX, destY, destRotZ, delay }) {
      const finalRotX = state === 1 ? 180 : 0; 
      const R = 20; 
      const length = 140; 
      
      const faces = [];
      for (let a = -90; a <= 90; a += 15) {
        const lightness = 35 - (Math.abs(a) / 90) * 20; 
        faces.push(
          <div key={a} className="absolute h-full"
               style={{
                 width: '6px', 
                 backgroundColor: `hsl(25, 70%, ${lightness}%)`,
                 transform: `rotateY(${a}deg) translateZ(${R}px)`,
                 left: '50%',
                 marginLeft: '-3px',
                 backfaceVisibility: 'hidden',
                 WebkitBackfaceVisibility: 'hidden'
               }} />
        );
      }

      return (
        <div className="absolute origin-center transform-style-3d scale-75 md:scale-100"
             style={{
               width: `${R * 2}px`, height: `${length}px`,
               animation: `yutToss 1.2s cubic-bezier(0.2, 0.8, 0.4, 1) forwards`,
               animationDelay: `${delay}s`,
               '--sx': `${startX}px`, '--dx': `${destX}px`, '--dy': `${destY}px`, '--rz': `${destRotZ}deg`, '--frx': `${finalRotX}deg`
             }}>
           <div className="w-full h-full relative transform-style-3d shadow-2xl">
              {faces}
              <div className="absolute w-full h-full flex flex-col items-center justify-evenly py-4"
                   style={{ transform: `translateZ(${R + 1}px)`, backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>
                 <span className="font-black text-[#290f01] opacity-70 text-xl md:text-2xl transform scale-x-150">X</span>
                 <span className="font-black text-[#290f01] opacity-70 text-xl md:text-2xl transform scale-x-150">X</span>
                 <span className="font-black text-[#290f01] opacity-70 text-lg md:text-xl transform scale-x-150">X</span>
                 <span className="font-black text-[#290f01] opacity-70 text-lg md:text-xl transform scale-x-150">X</span>
              </div>
              <div className="absolute w-full h-full bg-[#fde047] border-[3px] border-[#b45309] flex flex-col items-center justify-center overflow-hidden shadow-[inset_0_0_10px_rgba(180,83,9,0.3)]"
                   style={{ transform: 'rotateY(180deg) translateZ(0px)', backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }}>
                 <div className="absolute inset-0 opacity-10 bg-[repeating-linear-gradient(90deg,transparent,transparent_2px,#b45309_2px,#b45309_3px)]"></div>
                 {isMarked ? (
                   <div className="text-3xl md:text-4xl font-black text-red-600 transform -rotate-90 tracking-tighter z-10 drop-shadow-md whitespace-nowrap">빽도!</div>
                 ) : null}
              </div>
              <div className="absolute bg-[#5c2305] border-[#381c00]"
                   style={{ width: `${R*2}px`, height: `${R}px`, borderRadius: `0 0 ${R*2}px ${R*2}px`, top: 0, transformOrigin: 'top', transform: 'rotateX(-90deg)', backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }} />
              <div className="absolute bg-[#5c2305] border-[#381c00]"
                   style={{ width: `${R*2}px`, height: `${R}px`, borderRadius: `${R*2}px ${R*2}px 0 0`, bottom: 0, transformOrigin: 'bottom', transform: 'rotateX(90deg)', backfaceVisibility: 'hidden', WebkitBackfaceVisibility: 'hidden' }} />
           </div>
        </div>
      );

    // ==========================================
    // Main App Component
    // ==========================================
    function App() {
      const [user, setUser] = useState(null);
      const [authError, setAuthError] = useState(null); 
      const [currentView, setCurrentView] = useState('auth'); 
      const [rooms, setRooms] = useState([]);
      const [activeRoomId, setActiveRoomId] = useState(null);
      const [roomData, setRoomData] = useState(null);
      const [playerName, setPlayerName] = useState(`유저_${Math.floor(Math.random() * 1000)}`);
      // 사용자 전적 상태
      const [userStats, setUserStats] = useState({ wins: 0, losses: 0, versus: {} });

      // 이모티콘 팝업 애니메이션을 위한 상태 추가
      const [activeEmoticon, setActiveEmoticon] = useState(null);
      const lastEmoticonEventId = useRef(null);
      
      // 사용자 인증 상태 추적
      useEffect(() => {
        const unsubscribe = onAuthStateChanged(auth, (currentUser) => {
          if (currentUser) {
            // 핵심 수정: 과거에 캐시로 남아있는 '익명 계정'일 경우 강제로 로그아웃시켜 접속 차단
            if (currentUser.isAnonymous) {
              signOut(auth);
            } else {
              setUser(currentUser);
              setCurrentView(prev => prev === 'auth' ? 'lobby' : prev);
            }
          } else {
             setUser(null);
             setCurrentView('auth');
             setActiveRoomId(null);
             setRoomData(null);
             setUserStats({ wins: 0, losses: 0, versus: {} });
          }
        });
        return () => unsubscribe();
      }, []);

      // 이모티콘 팝업 표시 감지
      useEffect(() => {
        if (roomData?.emoticonEvent && roomData.emoticonEvent.id !== lastEmoticonEventId.current) {
          lastEmoticonEventId.current = roomData.emoticonEvent.id;
          setActiveEmoticon(roomData.emoticonEvent);
          setTimeout(() => {
            setActiveEmoticon(null);
          }, 2000); // 2초 후 사라짐
        }
      }, [roomData?.emoticonEvent]);

      // 사용자 접속 상태 갱신 (30초마다)
      useEffect(() => {
        if (!user || !db || !playerName) return;
        const userRef = doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_users', user.uid);
        
        const updateOnline = async () => {
          try {
            const snap = await getDoc(userRef);
            if (snap.exists()) {
              await updateDoc(userRef, { lastOnline: Date.now(), name: playerName });
            } else {
              await setDoc(userRef, { wins: 0, losses: 0, versus: {}, lastOnline: Date.now(), name: playerName });
            }
          } catch(e) {}
        };
        
        updateOnline();
        const intervalId = setInterval(updateOnline, 30000);
        return () => clearInterval(intervalId);
      }, [user, db, playerName]);

      // 사용자 전적(승률) 불러오기
      useEffect(() => {
        if (!user || !db) return;
        const userRef = doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_users', user.uid);
        const unsubscribe = onSnapshot(userRef, (docSnap) => {
          if (docSnap.exists()) {
            setUserStats(docSnap.data());
          }
        });
        return () => unsubscribe();
      }, [user]);

      // 방 목록 불러오기
      useEffect(() => {
        if (!user || !db) return;
        const roomsRef = collection(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms');
        const unsubscribe = onSnapshot(roomsRef, (snapshot) => {
          setRooms(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).filter(r => r.status !== 'finished'));
        }, (error) => {
          console.error(error);
          setAuthError("방 목록을 불러올 수 없습니다.");
        });
        return () => unsubscribe();
      }, [user]);

      // 특정 방 구독
      useEffect(() => {
        if (!user || !db || !activeRoomId) return;
        const roomRef = doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', activeRoomId);
        const unsubscribe = onSnapshot(roomRef, (docSnap) => {
          if (docSnap.exists()) {
            const data = docSnap.data();
            setRoomData(data);
            if (data.status === 'playing' && currentView !== 'game') setCurrentView('game');
            else if (data.status === 'turn_select' && currentView !== 'turn_select') setCurrentView('turn_select');
            else if (data.status === 'character_select' && currentView !== 'character_select') setCurrentView('character_select');
            else if (data.status === 'lobby' && currentView !== 'room') setCurrentView('room');
          } else {
            setActiveRoomId(null);
            setCurrentView('lobby');
          }
        });
        return () => unsubscribe();
      }, [user, activeRoomId, currentView]);

      // 방 만들기
      const createRoom = async () => {
        if (!user) return;
        try {
          const newRoomRef = doc(collection(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms'));
          await setDoc(newRoomRef, {
            name: `${playerName}의 방`,
            hostId: user.uid,
            status: 'lobby',
            players: [{ uid: user.uid, name: playerName, team: 'A' }],
            spectators: [], // 관전자 배열 추가
            turn: 'A',
            throwChances: 1, 
            characters: { A: null, B: null },
            ready: { A: false, B: false },
            turnData: null,
            winnerTeam: null, // 승리팀 저장용
            lastActionTime: Date.now(), // 타임아웃을 위한 시간 추가
            yutQueue: [],
            pieces: {
              A: [ {id: 0, pos: 0}, {id: 1, pos: 0}, {id: 2, pos: 0}, {id: 3, pos: 0} ],
              B: [ {id: 0, pos: 0}, {id: 1, pos: 0}, {id: 2, pos: 0}, {id: 3, pos: 0} ]
            },
            logs: ['게임 방이 생성되었습니다.']
          });
          setActiveRoomId(newRoomRef.id);
        } catch (error) {
          console.error("방 생성 에러:", error);
          alert("방을 만들 수 없습니다!\n파이어베이스 설정 문제: " + error.message);
        }
      };

      const joinRoom = async (roomId) => {
        if (!user) return;
        try {
          const room = rooms.find(r => r.id === roomId);
          if (!room) return;
          
          const isAlreadyPlayer = room.players.find(p => p.uid === user.uid);
          const isAlreadySpectator = room.spectators?.find(p => p.uid === user.uid);
          
          if (isAlreadyPlayer || isAlreadySpectator) { 
             setActiveRoomId(roomId); 
             return; 
          }
          
          if (room.status === 'lobby') {
            if (room.players.length >= 6) return alert("방이 가득 찼습니다.");
            const assignedTeam = room.players.filter(p => p.team === 'A').length <= room.players.filter(p => p.team === 'B').length ? 'A' : 'B';
            await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', roomId), {
              players: arrayUnion({ uid: user.uid, name: playerName, team: assignedTeam }),
              logs: arrayUnion(`${playerName}님이 입장했습니다.`)
            });
          } else {
            // 관전자로 입장
            await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', roomId), {
              spectators: arrayUnion({ uid: user.uid, name: playerName, team: 'spectator' }),
              logs: arrayUnion(`${playerName}님이 관전자로 입장했습니다.`)
            });
          }
          setActiveRoomId(roomId);
        } catch (error) {
          alert("방 입장 실패:\n" + error.message);
        }
      };

      // 방 나가기 및 기권 패배 처리
      const leaveRoom = async () => {
        if (!user || !activeRoomId || !roomData) return;
        const roomRef = doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', activeRoomId);
        
        const myPlayerInfo = roomData.players.find(p => p.uid === user.uid);
        const isSpectator = roomData.spectators?.some(p => p.uid === user.uid);

        // 1. 관전자인 경우 방 나가기
        if (isSpectator) {
           const updatedSpectators = roomData.spectators.filter(p => p.uid !== user.uid);
           await updateDoc(roomRef, {
              spectators: updatedSpectators,
              logs: arrayUnion(`${playerName}님이 관전을 종료했습니다.`)
           });
           setActiveRoomId(null);
           setCurrentView('lobby');
           return;
        }

        // 2. 플레이어인 경우 게임 중 기권 처리
        if (roomData.status === 'playing') {
          if (confirm("방을 나가면 기권으로 패배 처리됩니다.\n정말 나가시겠습니까?")) {
            const playingTeam = myPlayerInfo.team;
            const oppTeam = playingTeam === 'A' ? 'B' : 'A';
            
            const winners = roomData.players.filter(p => p.team === oppTeam && !p.isBot);
            const losers = roomData.players.filter(p => p.team === playingTeam && !p.isBot);

            // 전적 업데이트 로직 (기권 시)
            roomData.players.forEach(async (p) => {
               if (p.isBot || p.team === 'spectator') return;
               const userRefStats = doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_users', p.uid);
               const isWinner = p.team === oppTeam;
               const opps = isWinner ? losers : winners;
               
               try {
                 const userSnap = await getDoc(userRefStats);
                 let updates = {};
                 if (isWinner) updates.wins = increment(1);
                 else updates.losses = increment(1);
                 
                 opps.forEach(opp => {
                     if (isWinner) updates[`versus.${opp.uid}.wins`] = increment(1);
                     else updates[`versus.${opp.uid}.losses`] = increment(1);
                     updates[`versus.${opp.uid}.name`] = opp.name;
                 });

                 if (!userSnap.exists()) {
                    let initialData = { wins: isWinner ? 1 : 0, losses: !isWinner ? 1 : 0, versus: {} };
                    opps.forEach(opp => {
                        initialData.versus[opp.uid] = { wins: isWinner ? 1 : 0, losses: !isWinner ? 1 : 0, name: opp.name };
                    });
                    await setDoc(userRefStats, initialData);
                 } else {
                    await updateDoc(userRefStats, updates);
                 }
               } catch(err) {
                 console.error("전적 업데이트 에러:", err);
               }
            });

            // 게임 상태를 finished로 업데이트하여 모달을 띄움
            await updateDoc(roomRef, {
              status: 'finished',
              winnerTeam: oppTeam,
              logs: arrayUnion(`🚨 ${myPlayerInfo.name}님이 기권했습니다. ${oppTeam}팀 승리!`)
            });
            // 모달을 봐야 하므로 여기서 방을 바로 나가지 않고 리턴합니다.
            return;
          } else {
            // 취소 누른 경우 계속 게임 진행
            return;
          }
        }

        // 3. 일반적인 방 나가기 로직 (로비 상태, 종료 후 대기실 복귀 시 등)
        const updatedPlayers = roomData.players.filter(p => p.uid !== user.uid);
        if (updatedPlayers.length === 0) {
          await deleteDoc(roomRef);
        } else {
          await updateDoc(roomRef, {
            players: updatedPlayers,
            hostId: roomData.hostId === user.uid ? updatedPlayers[0].uid : roomData.hostId,
            logs: arrayUnion(`${myPlayerInfo?.name || playerName}님이 퇴장했습니다.`)
          });
        }
        
        setActiveRoomId(null);
        setCurrentView('lobby');
      };

      const deleteRoom = async (roomId) => {
        if (!user) return;
        if (!confirm("정말 이 방을 삭제하시겠습니까? (방장 권한)")) return;
        try {
          await deleteDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', roomId));
        } catch (error) {
          alert("방 삭제 실패:\n" + error.message);
        }
      };

      const addBot = async () => {
        if (!user || !activeRoomId || !roomData || roomData.hostId !== user.uid || roomData.players.length >= 6) return;
        const assignedTeam = roomData.players.filter(p => p.team === 'A').length <= roomData.players.filter(p => p.team === 'B').length ? 'A' : 'B';
        await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', activeRoomId), {
          players: arrayUnion({ uid: `bot_${Date.now()}`, name: `컴퓨터`, team: assignedTeam, isBot: true }),
          logs: arrayUnion(`컴퓨터가 추가되었습니다.`)
        });
      };

      const switchTeam = async () => {
        if (!user || !activeRoomId || !roomData) return;
        const updatedPlayers = roomData.players.map(p => p.uid === user.uid ? { ...p, team: p.team === 'A' ? 'B' : 'A' } : p);
        if (updatedPlayers.filter(p => p.team === 'A').length > 3 || updatedPlayers.filter(p => p.team === 'B').length > 3) return;
        await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', activeRoomId), { players: updatedPlayers });
      };

      const moveToCharacterSelect = async () => {
        if (!user || !activeRoomId || !roomData || roomData.hostId !== user.uid) return;
        if (roomData.players.filter(p => p.team === 'A').length === 0 || roomData.players.filter(p => p.team === 'B').length === 0) return alert("양 팀에 인원이 필요합니다.");
        await updateDoc(doc(db, 'artifacts', GLOBAL_APP_ID, 'public', 'data', 'yut_rooms', activeRoomId), { status: 'character_select' });
      };

      if (authError) return (
        <div className="flex h-screen flex-col items-center justify-center bg-gray-100 font-sans p-6 text-center">
          <div className="bg-white p-8 rounded-2xl shadow-xl border-2 border-red-500 max-w-lg">
            <h1 className="text-2xl font-black text-red-600 mb-4">접속 실패</h1>
            <p className="text-gray-700 bg-gray-100 p-4 rounded-lg break-words mb-6 font-mono text-sm">{authError}</p>
          </div>
        </div>
      );
      if (!user && currentView !== 'auth') return <div className="flex h-screen items-center justify-center bg-gray-100 font-sans font-bold text-xl text-gray-500 animate-pulse">서버 연결 중...</div>;

      // 레이아웃 전체 스크롤 관리 (모바일 스크롤 고정 오버레이)
      return (
        <div className="h-[100dvh] w-full bg-[#f3f4f6] font-sans text-gray-800 overflow-hidden flex flex-col lg:flex-row relative">
          
          {/* 전역 이모티콘 팝업 오버레이 */}
          {activeEmoticon && (
            <div className="fixed inset-0 z-[200] pointer-events-none flex items-center justify-center">
              <div className="flex flex-col items-center animate-[textPop_0.4s_cubic-bezier(0.175,0.885,0.32,1.275)_forwards]">
                <span className="bg-black/70 text-amber-400 px-4 py-1.5 rounded-full text-sm md:text-base font-bold mb-3 shadow-lg border border-white/20 backdrop-blur-sm">
                  📢 {activeEmoticon.sender}
                </span>
                <h2 className="text-5xl md:text-7xl font-black text-white text-center px-4 tracking-tighter" 
                    style={{ textShadow: '0 4px 20px rgba(0,0,0,0.8), -2px -2px 0 #000, 2px -2px 0 #000, -2px 2px 0 #000, 2px 2px 0 #000' }}>
                  {activeEmoticon.text}
                </h2>
              </div>
            </div>
          )}

          {currentView === 'auth' && <AuthView auth={auth} setAuthError={setAuthError} />}
          {currentView === 'lobby' && <LobbyView playerName={playerName} setPlayerName={setPlayerName} rooms={rooms} onCreate={createRoom} onJoin={joinRoom} user={user} onDelete={deleteRoom} auth={auth} userStats={userStats} db={db} appId={GLOBAL_APP_ID} />}
          {currentView === 'room' && <WaitingRoomView roomData={roomData} user={user} onSwitchTeam={switchTeam} onStart={moveToCharacterSelect} onLeave={leaveRoom} onAddBot={addBot} userStats={userStats} db={db} appId={GLOBAL_APP_ID} roomId={activeRoomId} />}
          {currentView === 'character_select' && <CharacterSelectView roomData={roomData} roomId={activeRoomId} user={user} db={db} appId={GLOBAL_APP_ID} />}
          {currentView === 'turn_select' && <TurnSelectView roomData={roomData} roomId={activeRoomId} user={user} db={db} appId={GLOBAL_APP_ID} />}
          {currentView === 'game' && <GameView roomData={roomData} roomId={activeRoomId} user={user} onLeave={leaveRoom} db={db} appId={GLOBAL_APP_ID} />}
        </div>
      );
    }

    // ==========================================
    // Lobby View
    // ==========================================
    function LobbyView({ playerName, setPlayerName, rooms, onCreate, onJoin, user, onDelete, auth, userStats, db, appId }) {
      const [onlineUsers, setOnlineUsers] = useState([]);
      const [lobbyMessages, setLobbyMessages] = useState([]);
      const [chatInput, setChatInput] = useState('');
      const [isMobileChatOpen, setIsMobileChatOpen] = useState(false); // 모바일 채팅창 상태
      const lobbyChatRef = useRef(null);

      const handleLogout = async () => {
         if(confirm("로그아웃 하시겠습니까?")) {
           await signOut(auth);
         }
      }

      // 로비: 접속자 목록 & 전체 채팅 데이터 가져오기
      useEffect(() => {
        if (!db || !appId) return;

        // 1. 접속자 목록 가져오기 (1분 이내 lastOnline 갱신된 유저)
        const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'yut_users');
        const unsubscribeUsers = onSnapshot(usersRef, (snapshot) => {
          const now = Date.now();
          const activeUsers = snapshot.docs
            .map(doc => ({ id: doc.id, ...doc.data() }))
            .filter(u => u.lastOnline && (now - u.lastOnline < 60000))
            .filter(u => u.name); // 이름이 있는 유저만 필터링
          setOnlineUsers(activeUsers);
        });

        // 2. 광장 채팅 데이터 가져오기 (메모리 정렬 적용)
        const chatRef = collection(db, 'artifacts', appId, 'public', 'data', 'yut_lobby_chat');
        const unsubscribeChat = onSnapshot(chatRef, (snapshot) => {
          const msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
          msgs.sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0)); // 오래된게 위로 오도록 오름차순 정렬
          setLobbyMessages(msgs);
        });

        return () => {
          unsubscribeUsers();
          unsubscribeChat();
        };
      }, [db, appId]);

      // 강제 스크롤 대신 scrollTop을 사용하여 뷰포트 흔들림 방지
      useEffect(() => {
        if (lobbyChatRef.current) {
          lobbyChatRef.current.scrollTop = lobbyChatRef.current.scrollHeight;
        }
      }, [lobbyMessages, isMobileChatOpen]);

      const sendLobbyChat = async (e) => {
        e.preventDefault();
        if (!chatInput.trim() || !db || !user) return;
        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'yut_lobby_chat'), {
          text: chatInput,
          uid: user.uid,
          name: playerName || '익명유저',
          timestamp: Date.now()
        });
        setChatInput('');
      };

      const totalGames = (userStats?.wins || 0) + (userStats?.losses || 0);
      const winRate = totalGames === 0 ? 0 : Math.round(((userStats.wins || 0) / totalGames) * 100);

      return (
        <div className="flex flex-col lg:flex-row h-[100dvh] w-full">
          {/* Main Lobby Area */}
          <div className="flex-1 overflow-y-auto custom-scrollbar relative p-4 md:p-6 pt-10 md:pt-20 pb-24 lg:pb-12">
            <button onClick={handleLogout} className="absolute top-4 right-4 md:top-6 md:right-6 flex items-center gap-1 md:gap-2 text-gray-500 hover:text-red-600 font-bold px-2 py-1.5 md:px-3 md:py-2 rounded-lg bg-white border border-gray-200 shadow-sm transition-colors text-xs md:text-sm">
              <LogOut size={14} className="md:w-4 md:h-4"/> 로그아웃
            </button>
            <div className="text-center mb-8 md:mb-12 mt-8 md:mt-0">
              <h1 className="text-4xl md:text-5xl font-black text-gray-800 mb-2 md:mb-4 tracking-tighter drop-shadow-sm">실시간 윷놀이</h1>
              <p className="text-gray-500 font-medium text-sm md:text-lg">가장 리얼한 온라인 윷놀이 보드게임</p>
            </div>
            
            <div className="grid grid-cols-1 md:grid-cols-2 gap-4 max-w-2xl mx-auto mb-6 md:mb-8">
              <div className="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-center">
                <label className="block text-xs md:text-sm font-bold text-gray-700 mb-2">내 닉네임</label>
                <input type="text" value={playerName} onChange={(e) => setPlayerName(e.target.value)} maxLength={10}
                  className="w-full px-3 md:px-4 py-2 md:py-3 bg-gray-50 border border-gray-300 rounded-lg md:rounded-xl focus:outline-none focus:border-amber-500 focus:ring-1 focus:ring-amber-500 transition-all text-sm md:text-base" />
              </div>
              
              <div className="bg-white p-4 md:p-6 rounded-xl md:rounded-2xl border border-gray-200 shadow-sm flex flex-col justify-center items-center">
                 <h2 className="text-xs md:text-sm font-bold text-gray-500 mb-2">내 전적 (자동 기록)</h2>
                 <div className="flex justify-center items-end gap-6">
                   <div className="text-center"><span className="block text-2xl md:text-3xl font-black text-blue-600">{userStats?.wins || 0}</span><span className="text-[10px] md:text-xs font-bold text-gray-400">승</span></div>
                   <div className="text-center"><span className="block text-2xl md:text-3xl font-black text-red-600">{userStats?.losses || 0}</span><span className="text-[10px] md:text-xs font-bold text-gray-400">패</span></div>
                   <div className="text-center ml-2 pl-6 border-l border-gray-200"><span className="block text-2xl md:text-3xl font-black text-amber-500">{winRate}%</span><span className="text-[10px] md:text-xs font-bold text-gray-400">승률</span></div>
                 </div>
              </div>
            </div>

            <div className="flex flex-col sm:flex-row justify-between items-center mb-4 md:mb-6 gap-4">
              <h2 className="text-xl md:text-2xl font-bold text-gray-800 flex items-center gap-2 w-full sm:w-auto"><Play className="text-amber-500 w-5 h-5 md:w-6 md:h-6" /> 게임 방 목록</h2>
              <button onClick={onCreate} className="w-full sm:w-auto bg-amber-600 hover:bg-amber-700 text-white px-6 py-3 rounded-lg md:rounded-xl font-bold shadow-md transition-all active:scale-95 text-sm md:text-base">방 만들기</button>
            </div>
            <div className="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-4 md:gap-5 pb-12">
              {rooms.length === 0 ? (
                <div className="col-span-full text-center py-12 md:py-16 text-gray-400 bg-white rounded-xl md:rounded-2xl border border-dashed border-gray-300 text-sm md:text-base">현재 개설된 방이 없습니다. 직접 만들어보세요!</div>
              ) : (
                rooms.map(room => {
                  // 게임 이어하기 및 관전하기 버튼 논리 처리
                  const isMyGame = user && room.players.some(p => p.uid === user.uid);
                  const isSpectator = user && room.spectators?.some(p => p.uid === user.uid);
                  let btnText = '참가하기';
                  if (isMyGame) {
                     btnText = room.status === 'lobby' ? '참가하기' : '이어하기';
                  } else if (isSpectator) {
                     btnText = '관전 중';
                  } else if (room.status !== 'lobby') {
                     btnText = '관전하기';
                  }

                  return (
                    <div key={room.id} className="bg-white p-4 md:p-5 rounded-xl md:rounded-2xl shadow-sm border border-gray-200 hover:border-amber-400 transition-all relative group flex flex-col justify-between min-h-[160px]">
                      {user && room.hostId === user.uid && (
                        <button onClick={(e) => { e.stopPropagation(); onDelete(room.id); }} className="absolute top-3 right-3 md:top-4 md:right-4 text-gray-400 hover:text-red-500 transition-colors" title="방 삭제">
                          <Trash2 size={16} />
                        </button>
                      )}
                      <div>
                        <div className="flex justify-between items-start mb-3 md:mb-4 pr-6">
                          <h3 className="font-bold text-base md:text-lg text-gray-800 flex-1 truncate mr-2">{room.name}</h3>
                          <span className={`text-[10px] md:text-xs px-2 py-1 rounded-md font-bold flex-shrink-0 ${room.status !== 'lobby' ? 'bg-purple-100 text-purple-600' : 'bg-green-100 text-green-600'}`}>
                            {room.status !== 'lobby' ? '게임중' : '대기중'}
                          </span>
                        </div>
                        <div className="flex items-center text-gray-500 text-xs md:text-sm mb-4 md:mb-5"><UsersIcon size={14} className="mr-1 md:mr-2 md:w-4 md:h-4" />인원: {room.players.length} / 6</div>
                      </div>
                      <button onClick={() => onJoin(room.id)} disabled={!isMyGame && room.status === 'lobby' && room.players.length >= 6}
                        className={`w-full font-bold py-2 md:py-2.5 rounded-md md:rounded-lg transition-colors border text-sm md:text-base
                          ${isMyGame && room.status !== 'lobby' ? 'bg-amber-100 text-amber-700 border-amber-200 hover:bg-amber-200' : 'bg-gray-100 text-gray-800 border-gray-200 hover:bg-gray-200 disabled:opacity-50'}
                        `}>
                        {btnText}
                      </button>
                    </div>
                  )
                })
              )}
            </div>
          </div>

          {/* Mobile Overlay Background */}
          {isMobileChatOpen && <div className="fixed inset-0 bg-black/60 z-[70] lg:hidden backdrop-blur-sm" onClick={() => setIsMobileChatOpen(false)}></div>}

          {/* Right Sidebar (Desktop Fixed Right, Mobile Slide-up Overlay) */}
          <div className={`fixed bottom-0 left-0 right-0 z-[80] h-[85dvh] bg-white rounded-t-3xl lg:rounded-none lg:static lg:h-full lg:w-80 lg:border-l border-gray-200 flex flex-col shadow-2xl lg:shadow-sm transform transition-transform duration-300 ${isMobileChatOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'}`}>
            
            {/* Mobile Header for Overlay */}
            <div className="flex justify-between items-center p-4 border-b border-gray-200 lg:hidden bg-gray-50 rounded-t-3xl flex-shrink-0">
               <span className="font-black text-gray-800 text-lg">광장 통신망</span>

    // ==========================================
    // Waiting Room View

      useEffect(() => {
        if (!db || !roomId) return;

        const unsubscribe = onSnapshot(q, (snapshot) => {
          setMessages(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })).reverse());

                <div className="space-y-2 md:space-y-3">

                    return (
                      <div key={p.uid} className="bg-white p-2 md:p-3 rounded-lg md:rounded-xl border border-blue-100 flex items-center gap-2 md:gap-3 shadow-sm overflow-hidden">

                              {vsStat ? `⚔️ 상대전적: ${vsStat.wins || 0}승 ${vsStat.losses || 0}패` : '⚔️ 첫 대결'}

                              내 캐릭터

                          )}

                    )

                  {teamA.length === 0 && <div className="text-blue-400 text-xs md:text-sm py-3 md:py-4 text-center border-2 border-dashed border-blue-200 rounded-lg md:rounded-xl">대기 중...</div>}
                </div>
              </div>
              <div className="bg-red-50/50 p-4 md:p-6 rounded-xl md:rounded-2xl border-t-4 border-red-400 shadow-sm">
                <div className="flex justify-between items-center mb-4 md:mb-6 border-b border-red-100 pb-2 md:pb-3">

                <div className="space-y-2 md:space-y-3">

                    const vsStat = !isMe && !p.isBot ? userStats?.versus?.[p.uid] : null;
                    return (
                      <div key={p.uid} className="bg-white p-2 md:p-3 rounded-lg md:rounded-xl border border-red-100 flex items-center gap-2 md:gap-3 shadow-sm overflow-hidden">

                        <div className="flex flex-col min-w-0">
                          <span className="font-medium text-gray-800 text-sm md:text-base truncate flex items-center">
                            {p.name} {isMe && <span className="text-red-500 text-xs md:text-sm ml-1 flex-shrink-0">(나)</span>}{p.uid === roomData.hostId && <span className="ml-1 text-amber-500 text-sm md:text-lg flex-shrink-0">👑</span>}{p.isBot && <span className="ml-1 text-sm md:text-xl flex-shrink-0">🤖</span>}
                          </span>
                          {!isMe && !p.isBot && (
                            <span className="text-[10px] md:text-xs text-gray-500 font-bold truncate">
                              {vsStat ? `⚔️ 상대전적: ${vsStat.wins || 0}승 ${vsStat.losses || 0}패` : '⚔️ 첫 대결'}
                            </span>
                          )}
                          {isMe && (
                            <span className="text-[10px] md:text-xs text-red-500 font-bold truncate">
                              내 캐릭터
                            </span>
                          )}
                        </div>
                      </div>
                    )
                  })}
                  {teamB.length === 0 && <div className="text-red-400 text-xs md:text-sm py-3 md:py-4 text-center border-2 border-dashed border-red-200 rounded-lg md:rounded-xl">대기 중...</div>}

              </div>
            </div>
            <div className="flex flex-col sm:flex-row gap-3 md:gap-4 justify-center">
              <button onClick={onSwitchTeam} className="w-full sm:w-auto bg-white border border-gray-300 text-gray-700 px-6 py-3 md:px-8 md:py-4 rounded-lg md:rounded-xl font-bold hover:bg-gray-50 transition-all shadow-sm text-sm md:text-base">팀 바꾸기</button>
              {isHost ? (
                <div className="flex flex-col sm:flex-row gap-3 md:gap-4 w-full sm:w-auto">
                  <button onClick={onAddBot} className="w-full sm:w-auto bg-purple-50 text-purple-700 border border-purple-200 px-6 py-3 md:px-8 md:py-4 rounded-lg md:rounded-xl font-bold hover:bg-purple-100 transition-all shadow-sm text-sm md:text-base">컴퓨터 추가</button>
                  <button onClick={onStart} className="w-full sm:w-auto bg-amber-600 text-white px-8 py-3 md:px-12 md:py-4 rounded-lg md:rounded-xl font-black text-base md:text-lg hover:bg-amber-700 transition-all shadow-md active:scale-95 border border-amber-700">말 선택 및 시작</button>
                </div>
              ) : (<div className="w-full sm:w-auto bg-gray-100 text-gray-500 border border-gray-200 px-6 py-3 md:px-12 md:py-4 rounded-lg md:rounded-xl font-bold text-center text-sm md:text-lg">방장의 시작을 대기 중...</div>)}
            </div>
          </div>

          {/* Mobile Overlay Background */}
          {isMobileChatOpen && <div className="fixed inset-0 bg-black/60 z-[70] lg:hidden backdrop-blur-sm" onClick={() => setIsMobileChatOpen(false)}></div>}

          {/* Right Area: Chat & Logs (Mobile Slide-up / Desktop Fixed) */}
          <div className={`fixed bottom-0 left-0 right-0 z-[80] h-[85dvh] bg-white rounded-t-3xl lg:rounded-none lg:static lg:h-full lg:w-80 lg:border-l border-gray-200 flex flex-col shadow-2xl lg:shadow-sm transform transition-transform duration-300 ${isMobileChatOpen ? 'translate-y-0' : 'translate-y-full lg:translate-y-0'}`}>
            <div className="flex justify-between items-center p-4 border-b border-gray-200 lg:hidden bg-gray-50 rounded-t-3xl flex-shrink-0">
               <span className="font-black text-gray-800 text-lg">채팅 및 기록</span>
               <button onClick={() => setIsMobileChatOpen(false)} className="text-gray-500 hover:text-red-500 font-bold px-4 py-1.5 bg-white border border-gray-300 rounded-lg text-sm shadow-sm">닫기 ✕</button>

            <div className="flex-1 lg:h-1/3 min-h-0 lg:min-h-[200px] border-b border-gray-200 flex flex-col bg-gray-50 flex-shrink-0">
